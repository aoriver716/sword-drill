name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.filter.outputs.go }}
      frontend: ${{ steps.filter.outputs.frontend }}
      build: ${{ steps.filter.outputs.build }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            go:
              - '**.go'
              - 'go.mod'
              - 'go.sum'
            frontend:
              - 'gui/frontend/**'
            build:
              - 'build/**'
              - 'wails.json'
              - 'installer/**'

  test:
    needs: changes
    if: needs.changes.outputs.go == 'true'
    strategy:
      matrix:
        include:
          - os: windows-latest
            go-version: "stable"
          - os: macos-latest
            go-version: "1.24.13"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Run tests
        run: go test ./...

  build:
    needs: changes
    if: needs.changes.outputs.go == 'true' || needs.changes.outputs.frontend == 'true' || needs.changes.outputs.build == 'true'
    uses: ./.github/workflows/build.yml
    with:
      version: ${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || format('main-{0}', github.sha) }}
    secrets: inherit
