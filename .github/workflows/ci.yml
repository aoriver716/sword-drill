name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        include:
          - os: windows-latest
            go-version: "stable"
          - os: macos-latest
            go-version: "1.24.13"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Run tests
        run: go test ./...

  build:
    if: github.event_name == 'pull_request'
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows/amd64
            artifact: sword-drill-windows-amd64.exe
            go-version: "stable"
          - os: macos-latest
            platform: darwin/universal
            artifact: sword-drill-macos-universal.app.zip
            go-version: "1.24.13"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        run: wails build -platform ${{ matrix.platform }} -ldflags "-X github.com/aoriver716/sword-drill/internal/updater.Version=pr-${{ github.event.number }}" -o sword-drill.exe

      - name: Rename Windows artifact
        if: matrix.os == 'windows-latest'
        run: |
          Copy-Item "build\bin\sword-drill.exe" "${{ matrix.artifact }}"

      - name: Build (macOS)
        if: matrix.os == 'macos-latest'
        run: wails build -platform ${{ matrix.platform }} -ldflags "-X github.com/aoriver716/sword-drill/internal/updater.Version=pr-${{ github.event.number }}"

      - name: Sign and package macOS app
        if: matrix.os == 'macos-latest'
        run: |
          APP=$(find build/bin -name "*.app" -maxdepth 1)
          chmod +x "$APP/Contents/MacOS/"*
          codesign --deep --force --sign - "$APP"
          cd build/bin
          zip -r "../../${{ matrix.artifact }}" *.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
