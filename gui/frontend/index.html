<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sword Drill</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Menu Bar -->
        <div id="menu-bar">
            <div id="menu-items">
                <div class="menu-dropdown">
                    <button class="menu-trigger">File</button>
                    <div class="menu-popup">
                        <button class="menu-item" id="menu-new-tab">New Tab<span class="menu-shortcut">Ctrl+N</span></button>
                        <hr class="menu-separator">
                        <button class="menu-item" id="menu-quit">Quit<span class="menu-shortcut">Ctrl+Q</span></button>
                    </div>
                </div>
            </div>
            <div id="menu-toolbar">
                <button id="btn-pause" title="Pause clipboard processing">
                    <svg id="icon-pause" width="14" height="14" viewBox="0 0 14 14" fill="currentColor">
                        <rect x="3" y="2" width="3" height="10" rx="0.5"/>
                        <rect x="8" y="2" width="3" height="10" rx="0.5"/>
                    </svg>
                    <svg id="icon-play" width="14" height="14" viewBox="0 0 14 14" fill="currentColor" style="display:none">
                        <path d="M3 1.5v11l9-5.5z"/>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Scripture Browser -->
        <div id="browser-panel">
            <div id="tab-bar-container">
                <div id="tab-bar"></div>
            </div>
            <div id="browser-toolbar"></div>
            <div id="tab-content">
                <div class="placeholder">
                    Highlight a scripture reference and press Ctrl+C to search it.<br>
                    Press Ctrl+N to open a new tab.
                </div>
            </div>
        </div>

        <!-- Resize Handle -->
        <div id="resize-handle"></div>

        <!-- Scripture Log -->
        <div id="log-panel">
            <div class="panel-header">
                <span class="panel-title">Scripture Log</span>
                <div class="toolbar">
                    <button id="btn-copy" title="Copy All">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
                            <rect x="5" y="5" width="9" height="9" rx="1"/>
                            <path d="M3 11V3a1 1 0 011-1h8"/>
                        </svg>
                    </button>
                    <button id="btn-clear" title="Clear">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M3 4h10M6 4V3h4v1M5 4v9h6V4"/>
                        </svg>
                    </button>
                </div>
            </div>
            <div id="log-entries"></div>
        </div>
    </div>

    <script src="wails/ipc.js"></script>
    <script src="wails/runtime.js"></script>
    <script src="bible-books.js"></script>
    <script src="app.js"></script>
</body>
</html>
