<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sword Drill</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Menu Bar -->
        <div id="menu-bar">
            <div id="menu-items">
                <div class="menu-dropdown">
                    <button class="menu-trigger">File</button>
                    <div class="menu-popup">
                        <button class="menu-item" id="menu-new-tab">New Tab<span class="menu-shortcut" data-shortcut="n"></span></button>
                        <hr class="menu-separator">
                        <button class="menu-item" id="menu-preferences">Preferences…</button>
                        <hr class="menu-separator">
                        <button class="menu-item" id="menu-quit">Quit<span class="menu-shortcut" data-shortcut="q"></span></button>
                    </div>
                </div>
            </div>
            <div id="menu-toolbar">
            </div>
        </div>

        <!-- Scripture Browser -->
        <div id="browser-panel">
            <div id="tab-bar-container">
                <div id="tab-bar"></div>
            </div>
            <div id="browser-toolbar"></div>
            <div id="tab-content">
                <div class="placeholder">
                    <div class="hint-column">
                        <span class="hint-label">Try me!</span>
                        <div class="sample-box">
                            <input class="sample-input" readonly value="John 3:16" />
                            <button class="sample-copy" title="Copy to clipboard">
                                <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
                                    <rect x="5" y="5" width="9" height="9" rx="1"/>
                                    <path d="M3 11V3a1 1 0 011-1h8"/>
                                </svg>
                            </button>
                        </div>
                        <span class="hint-label">Select the above text and press <kbd data-shortcut="c"></kbd></span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Resize Handle -->
        <div id="resize-handle"></div>

        <!-- Scripture Log -->
        <div id="log-panel">
            <div class="panel-header">
                <span class="panel-title">Scripture Log</span>
                <div class="toolbar">
                    <button id="btn-pause" title="Pause clipboard processing">
                        <svg id="icon-pause" width="16" height="16" viewBox="0 0 14 14" fill="currentColor">
                            <rect x="3" y="2" width="3" height="10" rx="0.5"/>
                            <rect x="8" y="2" width="3" height="10" rx="0.5"/>
                        </svg>
                        <svg id="icon-play" width="16" height="16" viewBox="0 0 14 14" fill="currentColor" style="display:none">
                            <path d="M3 1.5v11l9-5.5z"/>
                        </svg>
                    </button>
                    <button id="btn-copy" title="Copy All">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
                            <rect x="5" y="5" width="9" height="9" rx="1"/>
                            <path d="M3 11V3a1 1 0 011-1h8"/>
                        </svg>
                    </button>
                    <button id="btn-clear" title="Clear">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M3 4h10M6 4V3h4v1M5 4v9h6V4"/>
                        </svg>
                    </button>
                </div>
            </div>
            <div id="log-entries"></div>
        </div>

        <!-- Preferences Dialog -->
        <dialog id="prefs-dialog" class="prefs-dialog">
            <div class="prefs-header">
                <span class="prefs-title">Preferences</span>
                <button id="prefs-close" class="prefs-close-btn">&times;</button>
            </div>
            <div id="prefs-body" class="prefs-body"></div>
            <div id="prefs-restart-notice" class="prefs-restart-notice" style="display:none">
                Restart required for changes to take effect.
            </div>
            <div class="prefs-footer">
                <button id="prefs-reset" class="prefs-btn">Reset to Defaults</button>
                <div class="prefs-footer-right">
                    <button id="prefs-ok" class="prefs-btn prefs-btn-primary">OK</button>
                    <button id="prefs-cancel" class="prefs-btn">Cancel</button>
                    <button id="prefs-apply" class="prefs-btn">Apply</button>
                </div>
            </div>
        </dialog>
    </div>

    <script src="wails/ipc.js"></script>
    <script src="wails/runtime.js"></script>
    <script src="bible-books.js"></script>
    <script src="keybinds.js"></script>
    <script src="app.js"></script>
</body>
</html>
